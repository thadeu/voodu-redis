bind 0.0.0.0
port 6379
protected-mode yes
tcp-keepalive 60
timeout 0
maxclients 10000

appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

save 900 1
save 300 10
save 60 10000

dir /data
dbfilename dump.rdb

maxmemory-policy noeviction

loglevel notice
logfile ""

slowlog-log-slower-than 10000
slowlog-max-len 128

# --- Replication (M2 / F2.1) -------------------------------------
# These directives apply to BOTH master and replica pods. The
# entrypoint script picks the role at boot from VOODU_REPLICA_ORDINAL
# vs REDIS_MASTER_ORDINAL — this conf file is identical on every pod.
#
# replica-read-only: replica refuses writes, so a misrouted client
#   write fails fast instead of dropping data on the next resync.
# replica-serve-stale-data: keep serving cached reads while a replica
#   re-syncs from the master after a network blip — graceful
#   degradation over a stop-the-world unavailability window.
# min-replicas-to-write 0: master accepts writes even when zero
#   replicas are connected. Safer for the cache use case (sidekiq,
#   throwaway sessions); operators wanting "write only with N
#   replicas online" should override via the include directory.
replica-read-only yes
replica-serve-stale-data yes
min-replicas-to-write 0

# Operator override path: to tune any directive above, drop a
# replacement redis.conf via the existing volumes-merge contract:
#
#   redis "scope" "name" {
#     volumes = [
#       "${asset.scope.name.my_redis_conf}:/etc/redis/redis.conf:ro",
#     ]
#   }
#
# The volumes merge replaces the plugin's default redis.conf bind
# in-place by destination path. masterauth + requirepass are
# appended by the plugin AFTER this file (last-wins in redis), so
# the override file should NOT include those — they are owned by
# the plugin so password rotation stays automatic.

# The plugin's default redis.conf includes this line at the end, so
# the override file can be partial and only specify the directives to
include /etc/redis/conf.d/*.conf