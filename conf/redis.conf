# Production-ready redis.conf shipped by voodu-redis. The plugin
# materialises this file as an `asset` (key: redis_conf) and the
# generated statefulset bind-mounts it at /etc/redis/redis.conf.
#
# Operator customisation paths:
#
#   1. Edit this file in place under /opt/voodu/plugins/redis/conf/.
#      Next `vd apply` re-reads it; the asset hash changes; rolling
#      restart picks up the new content automatically. No rebuild.
#
#   2. Substitute bin/get-conf with a script that templates env /
#      hostname / anything dynamic. The plugin invokes get-conf at
#      expand time, so whatever stdout you emit becomes the conf.
#
#   3. Declare your own asset block + override volumes in the
#      redis block. Plugin defaults still fan out (orphan asset),
#      but your asset is what mounts.
#
# Redis 7+ rejects inline comments on most directives, so every
# annotation in this file lives on its own line. Edit with that
# constraint in mind — `save 900 1 # comment` errors at boot.

# --- Network -------------------------------------------------------

# Docker bridge (voodu0) filters external traffic — bind 0.0.0.0
# is safe here, the network policy is enforced at docker level.
bind 0.0.0.0
port 6379

# Connection-level hardening.
protected-mode yes
tcp-keepalive 60
timeout 0

# --- Connections ---------------------------------------------------

maxclients 10000

# --- Persistence ---------------------------------------------------

# AOF — durability across restarts. Combined with RDB snapshots
# below for belt-and-suspenders durability + fast recovery.
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshots. Tuned for general-purpose workloads:
#   - snapshot if 1+ writes accumulated in the last 15 minutes
#   - snapshot if 10+ writes in the last 5 minutes
#   - snapshot if 10k+ writes in the last 1 minute
# Adjust if you have a high-write hot-key pattern.
save 900 1
save 300 10
save 60 10000

dir /data
dbfilename dump.rdb

# --- Memory --------------------------------------------------------

# `noeviction` is the safest default — redis returns errors when
# full instead of dropping data. For pure-cache use cases, override
# via your own redis.conf with `allkeys-lru` or similar.
maxmemory-policy noeviction

# --- Logging -------------------------------------------------------

loglevel notice
logfile ""

# --- Slow log ------------------------------------------------------

slowlog-log-slower-than 10000
slowlog-max-len 128
