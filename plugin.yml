name: redis
version: 0.12.2
description: >
  Voodu macro plugin that expands redis { ... } HCL blocks into a
  fan-out (asset + statefulset) with a production-ready redis.conf.
  Replication-aware: replicas > 1 spawns 1 master + N-1 read replicas
  with async TCP replication, AOF persistence, and per-pod volumes.
  HA via Sentinel: declare a sibling redis resource with a
  `sentinel { enabled = true, monitor = "scope/name" }` block to run
  redis-sentinel against a peer data redis. Auto-failover with
  quorum-based promotion; consumer URLs refresh via the failover
  hook. See examples/sentinel-ha/ for the full pattern.
homepage: https://github.com/thadeu/voodu-redis

commands:
  - name: expand
    help: >
      Macro entrypoint invoked by the controller during apply.
      Reads an expand request from stdin and emits an envelope
      with asset + statefulset manifests on stdout.
  - name: get-conf
    help: >
      Print the production-ready redis.conf this plugin ships.
      Operators can inspect, copy, or edit conf/redis.conf in
      place — stdout is the file the expand command embeds.
  - name: link
    help: >
      Inject this redis's connection URL into a consumer's
      config bucket. Usage:
        vd redis:link [--reads] [--sentinel] <provider> <consumer>
      Builds redis://default:<password>@<provider>.<scope>.voodu:<port>
      using the password from `vd config get` then HCL env, sets
      it as REDIS_URL on the consumer. Consumer auto-restarts.
      When provider is a sentinel resource and --sentinel is set,
      additionally emits REDIS_SENTINEL_HOSTS + REDIS_MASTER_NAME
      for sentinel-aware clients.
  - name: unlink
    help: >
      Remove the previously-injected REDIS_URL from a consumer's
      config bucket. Symmetrical to `link`. Consumer auto-restarts.
  - name: new-password
    help: >
      Rotate the redis password. Generates a strong random
      password and stores it in the redis's config bucket
      (REDIS_PASSWORD). Operator runs `vd apply` next to
      propagate the new requirepass into redis.conf; linked
      consumers are auto-refreshed with the new URL.
  - name: failover
    help: >
      Promote a specific replica ordinal to master. Usage:
        vd redis:failover <scope/name> --replica <ordinal> [--no-restart]
      Reads as a sentence: "redis: failover on <scope/name>,
      promoting replica N". Flips REDIS_MASTER_ORDINAL on the
      provider's bucket, refreshes every linked consumer's URL,
      and rolls the statefulset top-down. One-shot — no `vd apply`
      needed; the controller's config-change fan-out triggers
      the rolling restart automatically.
      --no-restart skips the rolling restart of redis pods.
      Used by the sentinel auto-failover hook (roles already
      moved inside Redis) and by operators who manually flipped
      roles via redis-cli during incident recovery.
  - name: info
    help: >
      Show connection info for a redis instance: URL (redacted),
      port, data volume, password storage location.
      `vd redis:info <scope/name>`.

  - name: backup
    help: >
      Dump a Redis RDB snapshot from a pod to a local file. Usage:
        vd redis:backup <scope/name> --destination <path> [--source <ord>]
      Default source picks the highest-ordinal replica when
      replicas > 1 (offload the master); ordinal 0 for single-pod.
      Plugin owns the dump mechanics; operator wraps with cron +
      remote storage (s3/r2/scp/etc).

  - name: restore
    help: >
      Restore a Redis RDB snapshot into the master pod. Usage:
        vd redis:restore <scope/name> --from <path>
      Sequence: docker stop master, docker cp dump.rdb into the
      data volume, wipe AOF, docker start master. Replicas detect
      the divergent replication ID and full-SYNC automatically.
      REFUSED when sentinel watches this redis (sentinel-aware
      restore is a future feature).
  - name: help
    help: >
      Print plugin overview — list of commands and how to
      invoke each. Synthesized when operator types
      `vd redis -h` (no verb).
