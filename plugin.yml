name: redis
version: 0.1.0
description: Voodu macro plugin that expands `redis { ... }` HCL blocks into statefulset manifests.
homepage: https://github.com/thadeu/voodu-redis

commands:
  - name: expand
    help: Macro entrypoint — read expand request from stdin, emit statefulset manifest envelope on stdout. Invoked by the controller during `vd apply`; not meant for direct use.
