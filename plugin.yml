name: redis
version: 0.3.0
description: >
  Voodu macro plugin that expands redis { ... } HCL blocks into a
  fan-out (asset + statefulset) with a production-ready redis.conf.
homepage: https://github.com/thadeu/voodu-redis

commands:
  - name: expand
    help: >
      Macro entrypoint invoked by the controller during apply.
      Reads an expand request from stdin and emits an envelope
      with asset + statefulset manifests on stdout.
  - name: get-conf
    help: >
      Print the production-ready redis.conf this plugin ships.
      Operators can inspect, copy, or edit conf/redis.conf in
      place — stdout is the file the expand command embeds.
