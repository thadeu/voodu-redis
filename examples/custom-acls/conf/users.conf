# Custom Redis users — loaded inline as part of the plugin's
# redis.conf via `include /etc/redis/conf.d/*.conf`.
#
# CRITICAL RULE: do NOT include `user default ...` here.
#
# The default user is managed by the plugin's `requirepass` directive
# (appended at the end of redis.conf, after this file is parsed).
# Defining default here overrides that, breaking replication and
# `vd redis:new-password` rotation.
#
# Custom users below get whatever permissions the operator grants —
# scoped to specific keys, command categories, etc.

# Read/write user scoped to keys matching `app:*`
user appwriter on >change-me-app-secret ~app:* +@write +@read

# Read-only dashboard user
user dashboard on nopass ~* +@read -@dangerous

# Per-developer accounts for debugging via redis-cli
user thadeu  on allkeys +@all >change-me-thadeu-pass
user jessica on allkeys +@all >change-me-jessica-pass
