name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Verify tag matches plugin.yml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          plugin_version="$(grep '^version:' plugin.yml | awk '{print $2}')"
          if [ "$tag" != "$plugin_version" ]; then
            echo "tag $GITHUB_REF_NAME (=$tag) does not match plugin.yml version $plugin_version" >&2
            exit 1
          fi

      - name: Build cross binaries
        run: make cross

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/voodu-redis_linux_amd64 \
            dist/voodu-redis_linux_arm64
